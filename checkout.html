<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra | Cherry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="checkout-estilos.css">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="logo text-danger mb-0">Cherry</h2>
            <small class="text-muted">Moda femenina moderna</small>
        </div>
        <a href="index.html" class="btn btn-cherry-cart btn-sm px-4 py-2">Volver a la tienda</a>
    </div>
</div>
<div class="container py-5">
    <div class="row g-5">
        <div class="col-md-7 col-lg-8">
            <h4 class="mb-4 fw-bold">Información de Envío</h4>
            <form class="needs-validation" novalidate>
               <form id="checkout-form" novalidate>
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" id="nombre" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Apellido</label>
        <input type="text" id="apellido" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Dirección de entrega</label>
        <input type="text" id="direccion" class="form-control" placeholder="Calle, número, apto..." required>
    </div>

    <div class="payment-methods mt-4">
        <div class="payment-option-box">
            <input class="form-check-input" type="radio" name="metodoPago" id="pay-card" value="tarjeta" checked>
            <label class="form-check-label fw-bold ms-2" for="pay-card">Tarjeta de Crédito / Débito</label>
        </div>
        <div id="card-fields-container" class="row g-2 mt-2">
            <div class="col-12">
                <label class="form-label">Número de tarjeta</label>
                <input type="text" id="num-tarjeta" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19">
            </div>
            <div class="col-6">
                <label class="form-label">Expiración</label>
                <input type="text" id="expiracion" class="form-control" placeholder="MM/YY" maxlength="5">
            </div>
            <div class="col-6">
                <label class="form-label">CVV</label>
                <input type="password" id="cvv" class="form-control" placeholder="123" maxlength="4">
            </div>
        </div>

        <div class="payment-option-box mt-2">
            <input class="form-check-input" type="radio" name="metodoPago" id="pay-whatsapp" value="whatsapp">
            <label class="form-check-label fw-bold ms-2" for="pay-whatsapp">Acordar por WhatsApp</label>
        </div>
    </div>

    <button type="submit" class="btn-cherry-checkout mt-4">Pagar Ahora</button>
</form>
        </div>

        <div class="col-md-5 col-lg-4">
            <div class="card rounded-3 shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-4 fw-bold">Resumen de tu pedido</h4>

                
                <div class="border-top pt-3">
                    <div class="d-flex justify-content-between">
                        <span>Envío</span>
                        <span class="text-success fw-bold">Gratis</span>
                    </div>
                    <ul class="list-group list-group-flush mb-3" id="lista-resumen"></ul>

                    <div class="d-flex justify-content-between mt-2 fs-4">
                        <span class="fw-bold text-dark">Total</span>
                        <strong class="text-cherry" id="total-pago">$0</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="checkout-login.js"></script>
</body>
</html>
