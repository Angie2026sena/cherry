<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Cherry Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="login.css"> 
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card login-card border-0 shadow-lg my-5">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h1 class="cherry-logo mb-1">CHERRY</h1>
                <p class="text-muted small text-uppercase fw-bold ls-2">Únete a nuestra comunidad</p>
            </div>

            <h4 class="text-center fw-bold mb-4">Crear Cuenta</h4>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">NOMBRE COMPLETO</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" id="reg-nombre" class="form-control border-start-0 ps-0" placeholder="Tu nombre" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">CORREO ELECTRÓNICO</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" id="reg-email" class="form-control border-start-0 ps-0" placeholder="ejemplo@cherry.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">CONTRASEÑA</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" id="reg-password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="button" class="btn btn-cherry w-100 py-3 mb-3" onclick="registrar()">
                    REGISTRARME
                </button>
            </form>

            <p id="mensaje-reg" class="mt-3 text-center small fw-bold"></p>

            <div class="text-center mt-4">
                <p class="small text-muted">¿Ya tienes cuenta? <a href="login.html" class="text-danger fw-bold text-decoration-none">Inicia sesión</a></p>
                <a href="index.html" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left"></i> Volver a la tienda
                </a>
            </div>
        </div>
    </div>

    <script src="script_login.js"></script>
</body>
</html>
